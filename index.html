<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Magic 2.7 | Великий квест (Оновлений)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- KaTeX для рендерингу математики -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 50%, #be185d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        h1, h2 { font-family: 'Unbounded', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #f3f4f6;
        }

        .option-btn:not(:disabled):hover {
            transform: translateX(8px);
            border-color: #6366f1;
            background: #f8fafc;
        }

        .option-btn.correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide { animation: slideUp 0.4s ease-out forwards; }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #explanation-text .katex { font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="app" class="w-full max-w-lg">
        
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card rounded-[2.5rem] p-10 text-center animate-slide">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 rotate-3">
                <i class="fa-solid fa-infinity text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 mb-4 uppercase tracking-tight">Math<br><span class="text-indigo-600">Grand</span> Quest</h1>
            <p class="text-gray-500 mb-8 font-medium">Ви готові подолати 12 випадкових рівнів математичної майстерності?</p>
            <button onclick="startQuest()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-95">
                РОЗПОЧАТИ ПРИГОДУ
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden glass-card rounded-[2.5rem] p-8 md:p-10 relative overflow-hidden animate-slide">
            <div class="flex items-center justify-between mb-6">
                <span id="step-count" class="text-xs font-bold text-indigo-500 uppercase tracking-widest">Рівень 1</span>
                <div class="w-32 h-2 bg-gray-100 rounded-full">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <h2 id="question-text" class="text-xl md:text-2xl font-extrabold text-gray-800 mb-8 leading-snug">
                Завантаження...
            </h2>

            <div id="options-grid" class="grid grid-cols-1 gap-3 mb-6">
                <!-- Buttons injected here -->
            </div>

            <!-- Explanation Box -->
            <div id="explanation-box" class="hidden bg-indigo-50 border-l-4 border-indigo-500 p-6 rounded-r-2xl mb-6 animate-slide shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-lightbulb text-indigo-500"></i>
                    <p class="text-xs font-bold text-indigo-500 uppercase">Пояснення</p>
                </div>
                <div id="explanation-text" class="text-sm text-slate-700 leading-relaxed"></div>
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all flex items-center justify-center gap-2 group">
                ПРОДОВЖИТИ <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <!-- Final Screen -->
        <div id="final-screen" class="hidden glass-card rounded-[2.5rem] p-10 text-center animate-slide">
            <div class="text-6xl mb-6">🏆</div>
            <h2 class="text-3xl font-black text-gray-900 mb-2 uppercase">РЕЗУЛЬТАТ</h2>
            <p class="text-gray-500 mb-8 font-medium">Математика — це гімнастика для розуму.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-indigo-50 p-4 rounded-2xl text-center">
                    <p class="text-xs text-indigo-400 font-bold uppercase">Правильно</p>
                    <p id="final-score" class="text-3xl font-black text-indigo-600">0</p>
                </div>
                <div class="bg-pink-50 p-4 rounded-2xl text-center">
                    <p class="text-xs text-pink-400 font-bold uppercase">Твій Ранг</p>
                    <p id="final-rank" class="text-sm font-black text-pink-600 mt-2 uppercase">Ранг</p>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="shareResult()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-share-nodes"></i> ПОДІЛИТИСЯ РЕЗУЛЬТАТОМ
                </button>
                <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all">
                    ЗІГРАТИ ЩЕ РАЗ
                </button>
            </div>
            
            <p id="share-msg" class="mt-4 text-xs text-green-600 font-bold opacity-0 transition-opacity">Посилання скопійовано!</p>
        </div>
    </div>

    <script>
        const questUrl = "https://learn4life-ua.github.io/math-grand-quest/";
        const questions = [
            {
                q: "Яке число наступне: 2, 4, 8, 16...?",
                options: ["24", "30", "32", "64"],
                correct: 2,
                explain: "Це геометрична прогресія з множником 2. $16 \\times 2 = 32$."
            },
            {
                q: "Чому дорівнює (6 ÷ 2) × (1 + 2)?",
                options: ["1", "9", "3", "0"],
                correct: 1,
                explain: "За правилами порядку дій: спочатку дужки ($1+2=3$), потім ділення ($6 \\div 2 = 3$), і лише тоді множення ($3 \\times 3 = 9$)."
            },
            {
                q: "Цегла важить 1 кг + півцегли. Яка вага цілої цегли?",
                options: ["1.5 кг", "2 кг", "1.25 кг", "2.5 кг"],
                correct: 1,
                explain: "Рівняння: $x = 1 + 0.5x$. Звідси $0.5x = 1$, отже $x = 2$ кг."
            },
            {
                q: "Скільки місяців у році мають 28 днів?",
                options: ["1", "4", "6", "12"],
                correct: 3,
                explain: "Запитання з пасткою! Кожен з 12 місяців у році має принаймні 28 днів."
            },
            {
                q: "Яке число сьогодні, 14 березня, святкують математики (3.14)?",
                options: ["Ейлера (e)", "Золотий перетин", "Число Пі (π)", "Корінь з 2"],
                correct: 2,
                explain: "Саме 14 березня ($3.14$) світ святкує день числа $\\pi$, оскільки ця дата збігається з його першими розрядами."
            },
            {
                q: "Чому дорівнює квадратний корінь зі 144?",
                options: ["12", "14", "16", "24"],
                correct: 0,
                explain: "Оскільки $12 \\times 12 = 144$, то $\\sqrt{144} = 12$."
            },
            {
                q: "Яка сума кутів у будь-якому трикутнику на площині?",
                options: ["90°", "180°", "270°", "360°"],
                correct: 1,
                explain: "Це фундаментальна теорема евклідової геометрії: сума кутів трикутника завжди $180^\\circ$."
            },
            {
                q: "Скільки нулів у числі один мільярд?",
                options: ["6", "8", "9", "12"],
                correct: 2,
                explain: "Один мільярд — це $1,000,000,000$, тобто дев'ять нулів ($10^9$)."
            },
            {
                q: "Яке число в римській системі позначається буквою 'L'?",
                options: ["10", "50", "100", "500"],
                correct: 1,
                explain: "Римські цифри: $X=10, L=50, C=100, D=500, M=1000$."
            },
            {
                q: "Скільки дільників має будь-яке просте число?",
                options: ["0", "1", "2", "Безліч"],
                correct: 2,
                explain: "Просте число за визначенням має рівно два дільники: одиницю та саме себе."
            },
            {
                q: "Якщо катети прямокутного трикутника 3 і 4, чому дорівнює гіпотенуза?",
                options: ["5", "6", "7", "25"],
                correct: 0,
                explain: "За теоремою Піфагора: $3^2 + 4^2 = 9 + 16 = 25$. $\\sqrt{25} = 5$."
            },
            {
                q: "Яке число є нейтральним при множенні (не змінює результат)?",
                options: ["-1", "0", "1", "10"],
                correct: 2,
                explain: "Будь-яке число помножене на 1 залишається незмінним ($a \\times 1 = a$)."
            }
        ];

        let currentStep = 0;
        let score = 0;
        let answered = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuest() {
            shuffle(questions);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const data = questions[currentStep];
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('step-count').innerText = `Рівень ${currentStep + 1} з ${questions.length}`;
            document.getElementById('progress-bar').style.width = ((currentStep + 1) / questions.length * 100) + '%';
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full bg-white px-6 py-4 rounded-2xl font-bold text-gray-700 text-left";
                btn.innerText = opt;
                btn.onclick = () => handleSelect(idx, btn);
                grid.appendChild(btn);
            });
        }

        function handleSelect(idx, btn) {
            if (answered) return;
            answered = true;
            const correctIdx = questions[currentStep].correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);
            if (idx === correctIdx) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                buttons[correctIdx].classList.add('correct');
                document.getElementById('quiz-screen').classList.add('shake');
                setTimeout(() => document.getElementById('quiz-screen').classList.remove('shake'), 400);
            }
            const expText = document.getElementById('explanation-text');
            expText.innerHTML = questions[currentStep].explain;
            if (window.renderMathInElement) {
                renderMathInElement(expText, {
                    delimiters: [
                        {left: '$', right: '$', display: false},
                        {left: '$$', right: '$$', display: true}
                    ]
                });
            }
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentStep++;
            if (currentStep < questions.length) {
                showQuestion();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            let rank = "Новачок";
            if (score === questions.length) rank = "Архітектор Матриці";
            else if (score >= 10) rank = "Професор Чисел";
            else if (score >= 7) rank = "Ерудит";
            else if (score >= 4) rank = "Школяр";
            document.getElementById('final-rank').innerText = rank;
        }

        function shareResult() {
            const rank = document.getElementById('final-rank').innerText;
            const text = `Я пройшов Math Grand Quest з результатом ${score}/12 і отримав ранг "${rank}"! Спробуй і ти: ${questUrl}`;
            
            if (navigator.share) {
                navigator.share({ title: 'Math Grand Quest', text: text, url: questUrl }).catch(() => copyToClipboard(text));
            } else {
                copyToClipboard(text);
            }
        }

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const msg = document.getElementById('share-msg');
                msg.classList.remove('opacity-0');
                setTimeout(() => msg.classList.add('opacity-0'), 2000);
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$', right: '$', display: false},
                        {left: '$$', right: '$$', display: true}
                    ]
                });
            }
        });
    </script>
</body>
</html>
